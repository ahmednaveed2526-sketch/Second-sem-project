<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LASO - Connecting Services</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background-color: var(--bg-primary);
    }
    .spinner {
      border: 4px solid var(--border-color);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: var(--primary-color);
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script type="module">
    import { getSessionUser } from './js/utils.js';
    
    // Quick session routing
    setTimeout(() => {
      const user = getSessionUser();
      if (user) {
        window.location.href = `./pages/${user.userType}/dashboard.html`;
      } else {
        window.location.href = './pages/auth/user-type.html';
      }
    }, 500); // Small delay for smooth splash screen appearance
  </script>
</head>
<body>
  <div class="app-container">
    <div class="loading-screen">
      <h1 class="app-logo" style="font-size: 32px; justify-content: center; gap: 8px;">
        <img src="assets/logo.png" alt="LASO Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" style="height: 44px; max-height: 44px; object-fit: contain;">
        <span class="logo-text" style="display: none;">LASO<span>.</span></span>
      </h1>
      <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">Sri Lanka's Service Locator</p>
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
