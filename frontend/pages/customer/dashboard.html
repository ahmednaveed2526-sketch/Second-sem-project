<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LASO - Find Services</title>
  <link rel="stylesheet" href="../../styles/main.css">
  <script type="module" src="../../js/customer.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Scrollable Content -->
    <div class="scrollable">
      <div class="animate-fade-in">
        
        <!-- Search and Filter Section -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="form-control search-input" placeholder="Search for plumbers, electricians...">
        </div>

        <!-- District Filter Dropdown -->
        <div class="form-group" style="margin-bottom: 16px;">
          <div class="flex items-center justify-between" style="margin-bottom: 4px;">
            <label for="district-filter" class="form-label" style="margin: 0; font-size: 13px; color: var(--text-secondary);">Showing providers in:</label>
          </div>
          <select id="district-filter" class="form-control" style="padding: 8px 12px; font-size: 14px;">
            <option value="Colombo">Colombo</option>
            <option value="Gampaha">Gampaha</option>
            <option value="Kalutara">Kalutara</option>
            <option value="Kandy">Kandy</option>
            <option value="Matale">Matale</option>
            <option value="Nuwara Eliya">Nuwara Eliya</option>
            <option value="Galle">Galle</option>
            <option value="Matara">Matara</option>
            <option value="Hambantota">Hambantota</option>
            <option value="Jaffna">Jaffna</option>
            <option value="Kilinochchi">Kilinochchi</option>
            <option value="Mannar">Mannar</option>
            <option value="Vavuniya">Vavuniya</option>
            <option value="Mullaitivu">Mullaitivu</option>
            <option value="Batticaloa">Batticaloa</option>
            <option value="Ampara">Ampara</option>
            <option value="Trincomalee">Trincomalee</option>
            <option value="Kurunegala">Kurunegala</option>
            <option value="Puttalam">Puttalam</option>
            <option value="Anuradhapura">Anuradhapura</option>
            <option value="Polonnaruwa">Polonnaruwa</option>
            <option value="Badulla">Badulla</option>
            <option value="Moneragala">Moneragala</option>
            <option value="Ratnapura">Ratnapura</option>
            <option value="Kegalle">Kegalle</option>
          </select>
        </div>

        <!-- Category Chips -->
        <div id="category-chips" class="chips-container">
          <!-- Chips will be generated here -->
        </div>

        <!-- Provider Card Listings -->
        <div id="provider-list">
          <!-- Cards will be generated here -->
        </div>

      </div>
    </div>

    <!-- Navigation Bar -->
    <div id="nav-container"></div>
  </div>
</body>
</html>
