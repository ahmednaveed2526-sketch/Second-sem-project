<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LASO - Messages</title>
  <link rel="stylesheet" href="../../styles/main.css">
  <script type="module" src="../../js/customer.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Scrollable Content/Inbox/Chat Thread -->
    <div class="scrollable" id="messages-container">
      <!-- Generated dynamically by customer.js -->
      <div style="text-align: center; padding: 40px 0;">
        <span style="font-size: 24px;">⌛</span>
        <p style="color: var(--text-secondary); margin-top: 8px;">Loading inbox...</p>
      </div>
    </div>

    <!-- Navigation -->
    <div id="nav-container"></div>
  </div>
</body>
</html>
